<div
  class="relative z-10"
  aria-labelledby="modal-title"
  role="dialog"
  aria-modal="true"
>
  <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>

  <div
    class="fixed inset-0 z-10 w-screen flex items-center sm:flex sm:items-center sm:justify-center sm:h-full"
  >
    <div
      class="flex items-end justify-center p-4 text-center sm:items-center sm:flex sm:p-0"
    >
      <form
        class="w-full flex justify-center items-center"
        [formGroup]="rabiesSampleForm"
      >
        <div
          class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all s sm:my-8 sm:w-90 sm:max-w-6xl md:max-w-6xl"
        >
          <div
            class="bg-white h-[90vh] px-4 pb-4 pt-5 sm:p-6 sm:pb-4 md:overflow-x-scroll md:h-[70vh]"
          >
            <h1
              class="text-2xl flex items-start font-extrabold text-slate-600 mb-2"
            >
              Animal Profile
            </h1>
            <div class="grid grid-cols-5 gap-3">
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Residence of Animal</span>
                    </div>
                    <input
                      type="text"
                      formControlName="residence"
                      placeholder="Enter Residence(in 15 days)"
                      class="input input-bordered w-full"
                      ngDis
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Species</span>
                    </div>
                    <input
                      type="text"
                      class="input input-bordered w-full"
                      formControlName="species"
                      placeholder="Enter Address"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Breed</span>
                    </div>
                    <input
                      type="text"
                      class="input input-bordered w-full"
                      formControlName="breed"
                      placeholder="Enter Breed"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Gender</span>
                    </div>
                    <select
                      class="select select-bordered w-full"
                      formControlName="gender"
                    >
                      <option value="" disabled selected>
                        Please Select Gender
                      </option>
                      <option value="male">Male</option>
                      <option value="female">Female</option>
                      <option value="other">Other</option>
                    </select>
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Age(Month)</span>
                    </div>
                    <input
                      type="number"
                      formControlName="age"
                      placeholder="Age"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Type of Ownership</span>
                    </div>
                    <select
                      class="select select-bordered w-full"
                      formControlName="typeOfOwnership"
                    >
                      <option value="" disabled selected>Please Select</option>
                      <option value="household pet">Household Pet</option>
                      <option value="neighbor's pet">Neigbor's Pet</option>
                      <option value="stray animal">Stray Animal</option>
                    </select>
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Pet Management</span>
                    </div>
                    <select
                      class="select select-bordered w-full"
                      formControlName="petManagement"
                    >
                      <option value="" disabled selected>Please Select</option>
                      <option value="household pet">Confined</option>
                      <option value="neighbor's pet">Leashed</option>
                      <option value="stray animal">Free</option>
                    </select>
                  </label>
                </div>
              </div>
            </div>
            <div class="grid grid-cols-3 gap-4">
              <!-- First Row -->
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Cause of Death</span>
                    </div>
                    <select
                      class="select select-bordered w-full"
                      [formControlName]="
                        rabiesSampleForm.get('causeOfDeath')?.value == 'others'
                          ? 'causeOfDeathOther'
                          : 'causeOfDeath'
                      "
                    >
                      <option value="" disabled selected>Please Select</option>
                      <option value="euthanasia">Euthanasia</option>
                      <option value="accident">Accident</option>
                      <option value="illness">Illness</option>
                      <option value="others">Other</option>
                    </select>
                  </label>
                </div>
              </div>
              <div
                *ngIf="rabiesSampleForm.get('causeOfDeath')?.value == 'others'"
              >
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Please Specify</span>
                    </div>
                    <input
                      type="number"
                      formControlName="causeOfDeath"
                      placeholder="Enter Cause of Death"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Date of Death</span>
                    </div>
                    <input
                      type="date"
                      formControlName="dateOfDeath"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Time of Death</span>
                    </div>
                    <input
                      type="time"
                      formControlName="timeOfDeath"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Vaccination History</span>
                    </div>
                    <select
                      class="select select-bordered w-full"
                      [formControlName]="
                        rabiesSampleForm.get('otherVaccinationHistory')
                          ?.value == 'others'
                          ? 'otherVaccinationHistoryOther'
                          : 'otherVaccinationHistory'
                      "
                    >
                      <option value="" disabled selected>Please Select</option>
                      <option value="anit-rabies">Anti-Rabies</option>
                      <option value="others">Other</option>
                    </select>
                  </label>
                </div>
              </div>
              <!-- Second Row -->
              <div
                *ngIf="
                  rabiesSampleForm.get('otherVaccinationHistory')?.value ==
                  'others'
                "
              >
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Please Specify</span>
                    </div>
                    <input
                      type="number"
                      formControlName="otherVaccinationHistory"
                      placeholder="Enter Vaccine"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Date of Vaccination</span>
                    </div>
                    <input
                      type="date"
                      formControlName="otherDateofVaccination"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text"
                        >*For Puppies: Was Bitch Vaccinated?</span
                      >
                    </div>
                    <select
                      class="select select-bordered w-full"
                      formControlName="puppiesBitchVaccinated"
                    >
                      <option value="" disabled selected>Please Select</option>
                      <option value="yes">Yes</option>
                      <option value="No">No</option>
                    </select>
                  </label>
                </div>
                <div
                  *ngIf="
                    rabiesSampleForm.get('puppiesBitchVaccinated')?.value ==
                    'yes'
                  "
                >
                  <div class="sm:flex sm:items-center w-full">
                    <label class="form-control w-full">
                      <div class="label">
                        <span class="label-text">Date of Vaccination</span>
                      </div>
                      <input
                        type="date"
                        formControlName="dateOfVaccinationpuppies"
                        class="input input-bordered w-full"
                      />
                    </label>
                  </div>
                </div>
              </div>
            </div>
            <div class="grid grid-cols-3 gap-4">
              <div class="sm:flex sm:items-center w-full">
                <label class="form-control w-full">
                  <div class="label">
                    <span class="label-text"
                      >Contact With Other Animals</span
                    >
                  </div>
                  <select
                    class="select select-bordered w-full"
                    formControlName="contactWithAnimal"
                  >
                    <option value="" disabled selected>Please Select</option>
                    <option value="yes">Yes</option>
                    <option value="No">No</option>
                  </select>
                </label>
              </div>
              <div class="sm:flex sm:items-center w-full">
                <label class="form-control w-full">
                  <div class="label">
                    <span class="label-text"
                      >If Yes, Where?</span
                    >
                  </div>
                  <select
                    class="select select-bordered w-full"
                    [formControlName]="
                        rabiesSampleForm.get('whereContact')
                          ?.value == 'others'
                          ? 'whereContactOthers'
                          : 'whereContact'
                      "
                  >
                    <option value="" disabled selected>Please Select</option>
                    <option value="household">Household</option>
                    <option value="neighborhood">Neighborhood</option>
                    <option value="others">Other</option>
                  </select>
                </label>
              </div>
              <div
                *ngIf="
                  rabiesSampleForm.get('whereContact')?.value ==
                  'others'
                "
              >
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Please Specify</span>
                    </div>
                    <input
                      type="text"
                      formControlName="whereContact"
                      placeholder="Enter Where?"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
            </div>
            <h3 class="mb-4 mt-4 font-semibold text-gray-900 dark:text-white">
              Behavior Changes
            </h3>
            <ul
              class="w-48 text-sm font-medium text-gray-900 bg-white border border-gray-200 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white"
              formArrayName="description"
            >
              <ng-container *ngFor="let item of behaviorChanges; let i=index">
                <li
                  class="w-full border-b border-gray-200 rounded-t-lg dark:border-gray-600"
                >
                  <div class="flex items-center ps-3">
                    <input
                      id="vue-checkbox"
                      type="checkbox"
                      formControlName="description"
                      [value]="item.value"
                      (change)="onCheckboxChange($event)"
                      class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-700 dark:focus:ring-offset-gray-700 focus:ring-2 dark:bg-gray-600 dark:border-gray-500"
                    />
                    <label
                      for="vue-checkbox"
                      class="w-full py-3 ms-2 text-sm font-medium text-gray-900 dark:text-gray-300"
                      >
                      {{item.name}}
                    </label>
                  </div>
                </li>
              </ng-container>
            </ul>

            <h1
              class="text-2xl flex items-start font-extrabold text-slate-600 mb-2 mt-4"
            >
              Tissues Culture Vaccine (Data Given)
            </h1>
            <div class="grid grid-cols-6 gap-3">
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Route </span>
                    </div>
                    <input
                      type="text"
                      formControlName="route"
                      placeholder="Enter Route"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">D0 </span>
                    </div>
                    <input
                      type="date"
                      formControlName="dateOfFirstVaccine"
                      placeholder="Enter Route"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">D3 </span>
                    </div>
                    <input
                      type="date"
                      formControlName="dateOfSecondVaccine"
                      placeholder="Enter Route"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">D7 </span>
                    </div>
                    <input
                      type="date"
                      formControlName="dateOfThirdVaccine"
                      placeholder="Enter Route"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">D14(1M)</span>
                    </div>
                    <input
                      type="date"
                      formControlName="dateOfFourthVaccine"
                      placeholder="Enter Route"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">D28</span>
                    </div>
                    <input
                      type="date"
                      formControlName="dateOfFifthVaccine"
                      placeholder="Enter Date"
                      class="input input-bordered w-full"
                    />
                  </label>
                </div>
              </div>
            </div>
            <h1
              class="text-2xl flex items-start font-extrabold text-slate-600 mb-2 mt-4"
            >
              Vaccine Names
            </h1>
            <div class="grid grid-cols-6 gap-3">
              <div></div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">First Vaccine Used</span>
                    </div>
                    <select
                      type="number"
                      class="select select-bordered w-full"
                      formControlName="brandNameFirstVaccine"
                    >
                      <option value="" disabled selected>Please Select</option>
                      <!-- <option *ngFor="let item of _hvac.HVacs()" [value]="+item.Hid">{{item.vacName}}</option> -->
                    </select>
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Second Vaccine Used</span>
                    </div>
                    <select
                      type="number"
                      class="select select-bordered w-full disabled"
                      formControlName="brandNameSecondVaccine"
                    >
                      <option value="" disabled selected>Please Select</option>
                      <!-- <option *ngFor="let item of _hvac.HVacs()" [value]="+item.Hid">{{item.vacName}}</option> -->
                    </select>
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Third Vaccine Used</span>
                    </div>
                    <select
                      type="number"
                      class="select select-bordered w-full"
                      formControlName="brandNameThirdVaccine"
                    >
                      <option value="" disabled selected>Please Select</option>
                      <!-- <option *ngFor="let item of _hvac.HVacs()" [value]="+item.Hid">{{item.vacName}}</option> -->
                    </select>
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Fourth Vaccine Used</span>
                    </div>
                    <select
                      type="number"
                      class="select select-bordered w-full"
                      formControlName="brandNameFourthVaccine"
                    >
                      <option value="" disabled selected>Please Select</option>
                      <!-- <option *ngFor="let item of _hvac.HVacs()" [value]="+item.Hid">{{item.vacName}}</option> -->
                    </select>
                  </label>
                </div>
              </div>
              <div>
                <div class="sm:flex sm:items-center w-full">
                  <label class="form-control w-full">
                    <div class="label">
                      <span class="label-text">Fifth Vaccine Used</span>
                    </div>
                    <select
                      type="number"
                      class="select select-bordered w-full"
                      formControlName="brandNameFifthVaccine"
                    >
                      <option value="" disabled selected>Please Select</option>
                      <!-- <option *ngFor="let item of _hvac.HVacs()" [value]="+item.Hid">{{item.vacName}}</option> -->
                    </select>
                  </label>
                </div>
              </div>
            </div>
          </div>

          <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
            <app-adddatabtn
              (method)="addRabiesSamle()"
              (methodGetAll)="emitGetAll()"
              [addVacObservable]="addRabies$"
              (modalEvent)="closeModalAdd()"
            />
            <button
              type="button"
              class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto"
              (click)="this.modalEvent.emit(false)"
            >
              Cancel
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
